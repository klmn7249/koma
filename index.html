<!DOCTYPE html>
<html lang="hu" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kóma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Changa+One&family=Playfair+Display:wght@400;700&family=Archivo+Black&family=Fira+Sans:ital,wght@0,400;0,600;1,400&family=Fjalla+One&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS CUSTOM PROPERTIES
============================================= */
:root {
  --tq:          #1ABCB0;
  --tq-tr:       rgba(26,188,176,0.13);
  --tq-line:     rgba(26,188,176,0.55);
  --anth:        #383E42;
  --text:        #111111;
  --muted:       #666666;
  --bg:          #FFFFFF;
  --surface:     #FFFFFF;
  --border:      #E4E4E4;
  --divider:     rgba(0,0,0,0.07);
  --shadow:      0 2px 12px rgba(0,0,0,0.07);
  --topics-bg:   rgba(26,188,176,0.08);
}
[data-theme="dark"] {
  --tq-tr:       rgba(26,188,176,0.10);
  --anth:        #9A9A9A;
  --text:        #EDEDED;
  --muted:       #888888;
  --bg:          #141414;
  --surface:     #1E1E1E;
  --border:      #2C2C2C;
  --divider:     rgba(255,255,255,0.07);
  --shadow:      0 2px 14px rgba(0,0,0,0.4);
  --topics-bg:   rgba(26,188,176,0.07);
}

/* =============================================
   RESET & BASE
============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Fira Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.25s, color 0.25s;
  overflow-x: hidden;
  line-height: 1.6;
}
button, input, textarea, select { font-family: inherit; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }

/* =============================================
   VIEW SYSTEM
============================================= */
.view { display: none; }
.view.active { display: block; }

/* =============================================
   HEADER
============================================= */
.site-header {
  background: var(--tq);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#main-header { position: sticky; top: 0; }
#article-header { position: fixed; top: 0; width: 100%; }
#article-header.hidden { transform: translateY(-100%); }

.logo {
  font-family: 'Changa One', cursive;
  font-size: 26px;
  color: #fff;
  cursor: pointer;
  letter-spacing: 0.5px;
  user-select: none;
}
.header-right { display: flex; align-items: center; gap: 4px; }
.header-left  { display: flex; align-items: center; gap: 8px; }

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: none;
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s;
  flex-shrink: 0;
}
.icon-btn:hover { background: rgba(255,255,255,0.18); }

.back-btn {
  display: flex; align-items: center; gap: 5px;
  border: none; background: none;
  color: #fff; cursor: pointer;
  font-size: 14px; font-family: 'Fira Sans', sans-serif;
  padding: 5px 8px; border-radius: 7px;
  transition: background 0.18s;
}
.back-btn:hover { background: rgba(255,255,255,0.18); }

/* =============================================
   TOPICS ROW
============================================= */
.topics-row {
  position: sticky;
  top: 56px;
  z-index: 90;
  background: var(--topics-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 8px;
}
.topics-row::-webkit-scrollbar { display: none; }

.topic-btn {
  flex-shrink: 0;
  padding: 11px 15px;
  border: none; background: none;
  font-family: 'Archivo Black', sans-serif;
  font-size: 12px; letter-spacing: 0.3px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.18s, border-color 0.18s;
  white-space: nowrap;
}
.topic-btn:hover  { color: var(--tq); }
.topic-btn.active { color: var(--tq); border-bottom-color: var(--tq); }

/* =============================================
   MAIN PAGE LAYOUT
============================================= */
.page-wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 30px 16px 70px;
}

/* Featured article */
.feat-label {
  font-family: 'Archivo Black', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tq);
  margin-bottom: 12px;
}
.feat-card { cursor: pointer; }
.feat-card:hover .feat-title { color: var(--tq); }
.feat-cover {
  width: 100%; height: 320px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 18px;
  transition: opacity 0.18s;
}
.feat-cover:hover { opacity: 0.9; }
.feat-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700;
  line-height: 1.22;
  color: var(--text);
  padding-left: 16px;
  border-left: 4px solid var(--tq-line);
  margin-bottom: 10px;
  transition: color 0.18s;
}
.feat-desc {
  font-family: 'Fira Sans', sans-serif;
  font-size: 15px;
  color: var(--muted);
  padding-left: 20px;
  line-height: 1.65;
}

/* Divider */
.section-div {
  height: 1px;
  background: var(--divider);
  margin: 28px 0;
}

/* Article card */
.article-card {
  display: flex;
  gap: 14px;
  padding: 18px 0;
  border-bottom: 1px solid var(--divider);
  cursor: pointer;
  transition: opacity 0.18s;
}
.article-card:last-child { border-bottom: none; }
.article-card:hover { opacity: 0.72; }
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 16px; line-height: 1.28;
  color: var(--text);
  margin-bottom: 6px;
}
.card-desc {
  font-family: 'Fira Sans', sans-serif;
  font-size: 13px; color: var(--muted);
  line-height: 1.55; margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-author {
  font-family: 'Fira Sans', sans-serif;
  font-style: italic; font-size: 12px;
  color: var(--anth);
}
.card-thumb {
  width: 96px; height: 68px;
  object-fit: cover;
  border-radius: 7px;
  flex-shrink: 0;
  align-self: flex-start;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
}

/* =============================================
   ARTICLE PAGE
============================================= */
.art-header-spacer { height: 56px; }
.art-cover-img {
  width: 100%;
  max-height: 460px;
  object-fit: cover;
}
.art-body {
  max-width: 700px;
  margin: 0 auto;
  padding: 28px 16px 60px;
}
.art-title {
  font-family: 'Playfair Display', serif;
  font-size: 30px; font-weight: 700;
  line-height: 1.22;
  color: var(--text);
  margin-bottom: 16px;
}
.art-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--divider);
  margin-bottom: 28px;
}
.art-author {
  font-family: 'Fira Sans', sans-serif;
  font-style: italic;
  font-size: 14px;
  color: var(--anth);
}
.share-btn {
  display: flex; align-items: center; gap: 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px; color: var(--text);
  cursor: pointer;
  transition: background 0.18s;
  flex-shrink: 0;
}
.share-btn:hover { background: var(--border); }

/* Content blocks */
.cb-para {
  font-family: 'Fira Sans', sans-serif;
  font-size: 16px; line-height: 1.85;
  color: var(--text); margin-bottom: 20px;
}
.cb-heading {
  font-family: 'Fira Sans', sans-serif;
  font-weight: 600; font-size: 19px;
  color: var(--text);
  margin: 32px 0 12px;
}
.cb-highlight {
  font-family: 'Fira Sans', sans-serif;
  font-size: 16px; line-height: 1.75;
  color: var(--text);
  background: var(--tq-tr);
  border-left: 3px solid var(--tq);
  padding: 14px 18px;
  margin: 24px 0;
  border-radius: 0 8px 8px 0;
}
.cb-quote {
  font-family: 'Fjalla One', sans-serif;
  font-size: 22px; line-height: 1.45;
  color: var(--anth);
  border-left: 4px solid var(--anth);
  padding: 8px 20px;
  margin: 28px 0;
}
.cb-image { margin: 26px 0; }
.cb-image img { width: 100%; border-radius: 8px; }
.cb-caption {
  font-family: 'Fira Sans', sans-serif;
  font-style: italic; font-size: 12px;
  color: var(--muted);
  margin-top: 6px; text-align: center;
}

/* Hashtags */
.art-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 36px; padding-top: 22px;
  border-top: 1px solid var(--divider);
}
.tag-pill {
  font-family: 'Archivo Black', sans-serif;
  font-size: 12px; color: var(--tq);
  background: var(--tq-tr);
  border: 1px solid rgba(26,188,176,0.22);
  padding: 5px 13px; border-radius: 20px;
  cursor: pointer;
  transition: background 0.18s;
}
.tag-pill:hover { background: rgba(26,188,176,0.22); }

/* Related articles */
.related-wrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 16px 60px;
}
.related-label {
  font-family: 'Archivo Black', sans-serif;
  font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}
.rel-card { cursor: pointer; transition: opacity 0.18s; }
.rel-card:hover { opacity: 0.72; }
.rel-thumb {
  width: 100%; height: 110px;
  object-fit: cover; border-radius: 7px;
  margin-bottom: 7px;
}
.rel-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px; line-height: 1.3;
  color: var(--text);
}

/* =============================================
   SETTINGS SIDE PANEL
============================================= */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}
.side-panel {
  position: fixed; top: 0; right: -330px;
  width: 310px; height: 100%;
  z-index: 201;
  background: var(--surface);
  box-shadow: -4px 0 28px rgba(0,0,0,0.14);
  transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
  padding: 20px 18px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 0;
}
.side-panel.open { right: 0; }

.sp-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.sp-keres {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}
.sp-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 17px; color: var(--text);
}
.sp-close {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: none;
  cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s;
}
.sp-close:hover { background: var(--border); }

.sp-section-label {
  font-family: 'Archivo Black', sans-serif;
  font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
}
.sp-search-box {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  font-size: 14px; outline: none;
  transition: border-color 0.18s;
  margin-bottom: 6px;
}
.sp-search-box:focus { border-color: var(--tq); }

.sp-results { margin-bottom: 20px; }
.sp-result-item {
  padding: 9px 0; border-bottom: 1px solid var(--divider);
  font-size: 14px; color: var(--text);
  cursor: pointer; transition: color 0.18s;
}
.sp-result-item:hover { color: var(--tq); }

.sp-toggle-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--divider);
  margin-bottom: 20px;
}
.sp-toggle-label { font-size: 15px; color: var(--text); }

/* Toggle switch */
.toggle-wrap { position: relative; width: 44px; height: 24px; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--border); border-radius: 24px;
  cursor: pointer; transition: background 0.25s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: #fff; border-radius: 50%;
  transition: transform 0.25s;
}
.toggle-wrap input:checked ~ .toggle-slider { background: var(--tq); }
.toggle-wrap input:checked ~ .toggle-slider::before { transform: translateX(20px); }

.sp-admin-btn {
  width: 100%; padding: 11px;
  background: var(--tq); color: #fff;
  border: none; border-radius: 8px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 14px; cursor: pointer;
  transition: opacity 0.18s; margin-top: 4px;
}
.sp-admin-btn:hover { opacity: 0.86; }
.sp-logout-btn {
  width: 100%; padding: 11px;
  background: none; color: #e05555;
  border: 1px solid #e05555; border-radius: 8px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 14px; cursor: pointer;
  transition: background 0.18s; margin-top: 8px;
}
.sp-logout-btn:hover { background: rgba(224,85,85,0.08); }

/* =============================================
   ADMIN LOGIN PAGE
============================================= */
.auth-page {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); padding: 20px;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 38px 32px;
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow);
}
.auth-logo {
  font-family: 'Changa One', cursive;
  font-size: 30px; color: var(--tq); margin-bottom: 4px;
}
.auth-sub {
  font-size: 13px; color: var(--muted); margin-bottom: 28px;
}
.form-field { margin-bottom: 15px; }
.form-field label {
  display: block; font-size: 13px;
  font-weight: 600; color: var(--text); margin-bottom: 5px;
}
.form-input {
  width: 100%; padding: 10px 13px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  font-size: 14px; outline: none;
  transition: border-color 0.18s;
}
.form-input:focus { border-color: var(--tq); }
.form-input.error { border-color: #e05555; }
.err-msg { font-size: 12px; color: #e05555; margin-top: 5px; }
.btn-primary {
  width: 100%; padding: 11px;
  background: var(--tq); color: #fff;
  border: none; border-radius: 8px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 14px; cursor: pointer;
  transition: opacity 0.18s; margin-top: 6px;
}
.btn-primary:hover { opacity: 0.86; }
.btn-secondary {
  width: 100%; padding: 11px;
  background: none; color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 14px; cursor: pointer;
  transition: background 0.18s; margin-top: 8px;
}
.btn-secondary:hover { background: var(--border); }

/* =============================================
   ADMIN DASHBOARD
============================================= */
.admin-page { min-height: 100vh; background: var(--bg); }
.admin-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.admin-logo {
  font-family: 'Changa One', cursive;
  font-size: 22px; color: var(--tq);
}
.admin-topbar-right {
  display: flex; align-items: center; gap: 10px;
}
.admin-user {
  font-family: 'Fira Sans', sans-serif;
  font-style: italic; font-size: 13px;
  color: var(--anth);
}
.admin-content {
  max-width: 960px; margin: 0 auto;
  padding: 28px 16px 60px;
}
.admin-section-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 18px; color: var(--text); margin-bottom: 18px;
}
.admin-tabs {
  display: flex; gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.admin-tab {
  padding: 10px 18px;
  border: none; background: none;
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.18s, border-color 0.18s;
}
.admin-tab:hover { color: var(--tq); }
.admin-tab.active { color: var(--tq); border-bottom-color: var(--tq); }

/* Admin article list */
.admin-article-row {
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 12px; padding: 14px 0;
  border-bottom: 1px solid var(--divider);
  flex-wrap: wrap;
}
.aar-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 14px; color: var(--text);
  flex: 1; min-width: 0;
}
.aar-meta {
  font-size: 12px; color: var(--muted); margin-top: 2px;
}
.aar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.act-btn {
  padding: 5px 12px; border-radius: 6px;
  font-size: 12px; font-family: 'Archivo Black', sans-serif;
  cursor: pointer; transition: opacity 0.18s; border: none;
}
.act-btn:hover { opacity: 0.8; }
.act-btn.edit { background: var(--tq); color: #fff; }
.act-btn.del  { background: #e05555; color: #fff; }
.act-btn.feat { background: var(--border); color: var(--text); }
.act-btn.feat.on { background: #f0a500; color: #fff; }

/* New article button */
.new-article-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--tq); color: #fff;
  border: none; border-radius: 8px;
  padding: 10px 18px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px; cursor: pointer;
  transition: opacity 0.18s; margin-bottom: 20px;
}
.new-article-btn:hover { opacity: 0.86; }

/* =============================================
   ARTICLE EDITOR
============================================= */
.editor-page { min-height: 100vh; background: var(--bg); }
.editor-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  position: sticky; top: 0; z-index: 50;
}
.editor-topbar-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 15px; color: var(--text);
  flex: 1;
}
.editor-body {
  max-width: 820px; margin: 0 auto;
  padding: 28px 16px 80px;
}
.editor-field { margin-bottom: 20px; }
.editor-label {
  display: block; font-size: 12px;
  font-family: 'Archivo Black', sans-serif;
  letter-spacing: 0.5px;
  color: var(--muted); margin-bottom: 6px;
}
.editor-input {
  width: 100%; padding: 10px 13px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  font-size: 15px; outline: none;
  transition: border-color 0.18s;
}
.editor-input:focus { border-color: var(--tq); }

/* Content block builder */
.block-toolbar {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 12px 0; margin-bottom: 6px;
  border-top: 1px solid var(--divider);
  border-bottom: 1px solid var(--divider);
}
.blk-btn {
  padding: 6px 12px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 12px; font-family: 'Archivo Black', sans-serif;
  cursor: pointer; transition: background 0.18s, border-color 0.18s;
}
.blk-btn:hover { border-color: var(--tq); color: var(--tq); }

.blocks-area { margin-bottom: 24px; }
.content-block {
  position: relative;
  margin-bottom: 10px; border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
.content-block:focus-within { border-color: var(--tq); }
.block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--divider);
}
.block-type-label {
  font-size: 10px; font-family: 'Archivo Black', sans-serif;
  letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
}
.block-del {
  width: 22px; height: 22px; border-radius: 50%;
  border: none; background: none; color: #e05555;
  cursor: pointer; font-size: 14px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s;
}
.block-del:hover { background: rgba(224,85,85,0.1); }
.block-textarea {
  width: 100%; padding: 10px 13px;
  border: none; outline: none; resize: vertical;
  background: var(--bg); color: var(--text);
  font-size: 14px; line-height: 1.65;
  min-height: 80px;
}
.block-img-field {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 13px;
}
.block-img-field input {
  flex: 1; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text);
  font-size: 13px; outline: none;
  transition: border-color 0.18s;
}
.block-img-field input:focus { border-color: var(--tq); }
.block-img-stack { padding: 0 13px 10px; }
.block-img-stack input {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text);
  font-size: 13px; outline: none;
  transition: border-color 0.18s; margin-bottom: 6px;
}
.block-img-stack input:focus { border-color: var(--tq); }
.img-preview {
  width: 100%; max-height: 180px;
  object-fit: cover; border-radius: 6px; margin-top: 6px;
}

/* Tags editor */
.tags-input-wrap {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 10px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); cursor: text;
  min-height: 44px; align-items: center;
  transition: border-color 0.18s;
}
.tags-input-wrap:focus-within { border-color: var(--tq); }
.tag-chip {
  display: flex; align-items: center; gap: 4px;
  background: var(--tq-tr);
  border: 1px solid rgba(26,188,176,0.22);
  color: var(--tq);
  font-family: 'Archivo Black', sans-serif;
  font-size: 11px; border-radius: 20px;
  padding: 3px 10px;
}
.tag-chip button {
  background: none; border: none; color: var(--tq);
  cursor: pointer; font-size: 13px; line-height: 1;
  padding: 0; display: flex; align-items: center;
}
.tags-text-input {
  border: none; outline: none; background: none;
  color: var(--text); font-size: 13px; min-width: 80px; flex: 1;
}

/* =============================================
   TOPICS ADMIN
============================================= */
.topic-admin-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--divider);
}
.topic-admin-name {
  flex: 1; font-size: 14px; color: var(--text);
  font-family: 'Archivo Black', sans-serif;
}
.topic-visible-chk { accent-color: var(--tq); width: 16px; height: 16px; cursor: pointer; }
.topic-vis-label { font-size: 12px; color: var(--muted); }

/* =============================================
   ACCOUNTS ADMIN
============================================= */
.account-row {
  display: flex; align-items: center;
  gap: 12px; padding: 12px 0;
  border-bottom: 1px solid var(--divider); flex-wrap: wrap;
}
.acc-name {
  flex: 1; font-family: 'Archivo Black', sans-serif;
  font-size: 14px; color: var(--text);
}
.acc-role {
  font-size: 11px; font-family: 'Fira Sans', sans-serif;
  color: var(--tq); border: 1px solid var(--tq);
  border-radius: 10px; padding: 2px 9px;
}

/* =============================================
   TOAST NOTIFICATIONS
============================================= */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #222; color: #fff;
  font-size: 13px; font-family: 'Fira Sans', sans-serif;
  padding: 10px 22px; border-radius: 24px;
  z-index: 999; transition: transform 0.3s, opacity 0.3s;
  opacity: 0; pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* =============================================
   MODAL
============================================= */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300; display: none;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 14px; padding: 28px;
  max-width: 400px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}
.modal-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 16px; color: var(--text); margin-bottom: 10px;
}
.modal-text { font-size: 14px; color: var(--muted); margin-bottom: 22px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-cancel {
  padding: 8px 18px; border-radius: 7px;
  border: 1px solid var(--border); background: none;
  color: var(--text); font-size: 13px; cursor: pointer;
  font-family: 'Archivo Black', sans-serif;
  transition: background 0.18s;
}
.modal-cancel:hover { background: var(--border); }
.modal-confirm {
  padding: 8px 18px; border-radius: 7px;
  border: none; background: #e05555; color: #fff;
  font-size: 13px; cursor: pointer;
  font-family: 'Archivo Black', sans-serif;
  transition: opacity 0.18s;
}
.modal-confirm:hover { opacity: 0.82; }

/* =============================================
   LOADING SPINNER
============================================= */
.spinner-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 60px 0;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--tq);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* =============================================

============================================= */
@media (max-width: 600px) {

  .related-grid { grid-template-columns: 1fr 1fr; }
  .admin-article-row { flex-direction: column; align-items: flex-start; }
  .aar-actions { width: 100%; }
}

<!-- =============================================

<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc,
         getDocs, getDoc, addDoc, setDoc,
         updateDoc, deleteDoc, query,
         orderBy, where, serverTimestamp }      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ── Firebase init ── */
const firebaseConfig = {
  apiKey:            "AIzaSyDvZU8qdiCE23Rjx-CD175-i0XrHZymHT4",
  authDomain:        "koma-news.firebaseapp.com",
  projectId:         "koma-news",
  storageBucket:     "koma-news.firebasestorage.app",
  messagingSenderId: "935844182822",
  appId:             "1:935844182822:web:fb9f0b08020e8a62739fe7"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);

/* Admin emails — must match Firestore rules isAdmin() list */
const ADMIN_EMAILS = ['kelemeng771@gmail.com'];

function isAllowedAdmin(user) {
  const email = user?.email?.toLowerCase();
  return email && ADMIN_EMAILS.includes(email);
}

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let allArticles   = [];
let allTopics     = [];
let currentAdmin  = null;       // { uid, email, username }
let editorArticle = null;       // article being edited (null = new)
let editorBlocks  = [];         // [{type, text, url, caption}]
let editorTags    = [];
let currentTopic  = 'all';
let featuredId    = null;

/* ════════════════════════════════════════════
   UTILITY
════════════════════════════════════════════ */
function escapeHtml(str = '') {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
function showToast(msg, duration=2600) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
window.showView = showView;

window.showMain = function() { showView('view-main'); renderMain(); };

/* ════════════════════════════════════════════
   DARK MODE
════════════════════════════════════════════ */
window.toggleDark = function(on) {
  document.documentElement.setAttribute('data-theme', on ? 'dark' : 'light');
  localStorage.setItem('koma_dark', on ? '1' : '0');
};
(function() {
  const saved = localStorage.getItem('koma_dark');
  const on    = saved === '1';
  document.documentElement.setAttribute('data-theme', on ? 'dark' : 'light');
  const cb = document.getElementById('darkToggle');
  if (cb) cb.checked = on;
})();

/* ════════════════════════════════════════════
   SETTINGS PANEL
════════════════════════════════════════════ */
window.openPanel = function() {
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderSpAdminArea();
};
window.closePanel = function() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
};

function renderSpAdminArea() {
  const area = document.getElementById('spAdminArea');
  if (currentAdmin) {
    area.innerHTML = `
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">
        Bejelentkezve: <b style="color:var(--text);">${escapeHtml(adminDisplayName())}</b>
      </p>
      <button class="sp-admin-btn" onclick="closePanel();showView('view-admin');loadAdminDashboard();">Admin felület</button>
      <button class="sp-logout-btn" onclick="closePanel();confirmLogout();">Kijelentkezés</button>`;
  } else {
    area.innerHTML = `<button class="sp-admin-btn" onclick="closePanel();showView('view-login')">Admin bejelentkezés</button>`;
  }
}

/* ── Panel search ── */
window.handlePanelSearch = function(val) {
  const box = document.getElementById('spResults');
  if (!val.trim()) { box.innerHTML = ''; return; }
  const q = val.toLowerCase();
  const hits = allArticles.filter(a =>
    a.title.toLowerCase().includes(q) ||
    (a.desc||'').toLowerCase().includes(q) ||
    (a.tags||[]).some(t => t.toLowerCase().includes(q))
  ).slice(0,6);
  box.innerHTML = hits.length
    ? hits.map(a => `<div class="sp-result-item" onclick="closePanel();openArticle('${a.id}')">${escapeHtml(a.title)}</div>`).join('')
    : `<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nincs találat.</div>`;
};

/* ════════════════════════════════════════════
   MODAL
════════════════════════════════════════════ */
let _modalResolve = null;
function openModal(title, text, confirmLabel='Törlés') {
  document.getElementById('modalTitle').textContent   = title;
  document.getElementById('modalText').textContent    = text;
  document.getElementById('modalConfirm').textContent = confirmLabel;
  document.getElementById('modalOverlay').classList.add('open');
  return new Promise(res => {
    _modalResolve = res;
    document.getElementById('modalConfirm').onclick = () => closeModal(true);
  });
}
window.closeModal = function(confirmed = false) {
  document.getElementById('modalOverlay').classList.remove('open');
  if (_modalResolve) {
    _modalResolve(!!confirmed);
    _modalResolve = null;
  }
};

/* ════════════════════════════════════════════
   FIRESTORE HELPERS
════════════════════════════════════════════ */
function articleSortTime(a) {
  const t = a.createdAt || a.updatedAt;
  if (!t) return 0;
  if (typeof t.toMillis === 'function') return t.toMillis();
  if (typeof t.seconds === 'number') return t.seconds * 1000;
  return 0;
}
async function fetchArticles() {
  const snap = await getDocs(collection(db,'articles'));
  allArticles = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  allArticles.sort((a, b) => articleSortTime(b) - articleSortTime(a));
}
async function fetchTopics() {
  const snap = await getDocs(collection(db,'topics'));
  allTopics   = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  allTopics.sort((a,b)=>(a.order||0)-(b.order||0));
}
async function fetchSettings() {
  try {
    const d = await getDoc(doc(db,'settings','global'));
    if (d.exists()) featuredId = d.data().featuredId || null;
  } catch(e) {}
}

async function loadAdminProfile(uid) {
  const d = await getDoc(doc(db, 'profiles', uid));
  return d.exists() ? d.data() : null;
}

function adminDisplayName(admin = currentAdmin) {
  if (!admin) return '';
  return (admin.username || '').trim() || admin.email || '';
}

function getAuthorName() {
  const name = (currentAdmin?.username || '').trim();
  if (name) return name;
  const email = (currentAdmin?.email || auth.currentUser?.email || '').trim();
  return email ? email.split('@')[0] : '';
}

async function setCurrentAdminFromUser(user) {
  const profile = await loadAdminProfile(user.uid);
  currentAdmin = {

  };
}

/* ════════════════════════════════════════════
   MAIN PAGE RENDER
════════════════════════════════════════════ */
function renderMain() {
  const wrap = document.getElementById('mainContent');
  let articles = currentTopic === 'all'
    ? allArticles
    : allArticles.filter(a => (a.tags||[]).includes(currentTopic));

  if (!articles.length) {
    wrap.innerHTML = `<div class="empty-state">Nincsenek cikkek ebben a témában.</div>`;
    return;
  }

  const featured = articles.find(a => a.id === featuredId) || articles[0];
  const rest     = articles.filter(a => a.id !== featured.id);

  wrap.innerHTML = `
    <div class="feat-label">Kiemelt cikk</div>
    <div class="feat-card" onclick="openArticle('${featured.id}')">
      ${featured.cover ? `<img class="feat-cover" src="${featured.cover}" alt="${featured.title}" loading="lazy">` : ''}
      <div class="feat-title">${featured.title}</div>
      ${featured.desc ? `<div class="feat-desc">${featured.desc}</div>` : ''}
    </div>
    <div class="section-div"></div>
    <div id="articleList">
      ${rest.map(a => articleCardHTML(a)).join('')}
    </div>`;
}

function articleCardHTML(a) {
  return `
    <div class="article-card" onclick="openArticle('${a.id}')">
      <div class="card-body">
        <div class="card-title">${escapeHtml(a.title)}</div>
        ${a.desc ? `<div class="card-desc">${escapeHtml(a.desc)}</div>` : ''}
      </div>
      ${a.cover ? `<img class="card-thumb" src="${a.cover}" alt="${escapeHtml(a.title)}" loading="lazy">` : ''}
    </div>`;
}

/* ════════════════════════════════════════════
   OPEN ARTICLE
════════════════════════════════════════════ */
window.openArticle = async function(id) {
  let article = allArticles.find(a => a.id === id);
  if (!article) {
    try {
      const d = await getDoc(doc(db,'articles',id));
      if (d.exists()) article = { id:d.id, ...d.data() };
      else { showToast('A cikk nem található.'); return; }
    } catch(e) { showToast('Hiba a cikk betöltésekor.'); return; }
  }

  const related = getRelated(article);
  try {
    document.getElementById('articleContent').innerHTML = buildArticleHTML(article, related);
  } catch (e) {
    console.error(e);
    showToast('Hiba a cikk megjelenítésekor.');
    return;
  }
  showView('view-article');
  /* reset header */
  const hdr = document.getElementById('article-header');
  hdr.classList.remove('hidden');
  lastScrollY = 0;
};

function getRelated(article) {
  const tags = article.tags || [];
  return allArticles
    .filter(a => a.id !== article.id && (a.tags||[]).some(t => tags.includes(t)))
    .sort(() => Math.random() - 0.5)
    .slice(0,4);
}

function buildArticleHTML(a, related) {
  const blocks = (a.blocks||[]).map(renderBlock).join('');
  const tags   = (a.tags||[]).map(t =>
    `<span class="tag-pill" onclick="filterTopic('${t}');showMain();">#${t}</span>`
  ).join('');
  const relHTML = related.length ? `
    <div class="related-wrap">
      <div class="related-label">Hasonló cikkek</div>
      <div class="related-grid">
        ${related.map(r => `
          <div class="rel-card" onclick="openArticle('${r.id}')">
            ${r.cover ? `<img class="rel-thumb" src="${r.cover}" alt="${r.title}" loading="lazy">` : ''}
            <div class="rel-title">${r.title}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="art-header-spacer"></div>
    ${a.cover ? `<img class="art-cover-img" src="${a.cover}" alt="${escapeHtml(a.title)}" loading="lazy">` : ''}
    <div class="art-body">
      <h1 class="art-title">${escapeHtml(a.title)}</h1>
      <div class="art-meta">
        ${a.author ? `<span class="art-author">${escapeHtml(a.author)}</span>` : '<span></span>'}
        <button class="share-btn" onclick="shareArticle('${a.id}','${encodeURIComponent(a.title)}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Megosztás
        </button>
      </div>
      ${blocks}
      ${tags ? `<div class="art-tags">${tags}</div>` : ''}
    </div>
    ${relHTML}`;
}

function renderBlock(b) {
  switch(b.type) {
    case 'para':      return `<p class="cb-para">${escapeHtml(b.text||'')}</p>`;
    case 'heading':   return `<h2 class="cb-heading">${escapeHtml(b.text||'')}</h2>`;
    case 'highlight': return `<div class="cb-highlight">${escapeHtml(b.text||'')}</div>`;
    case 'quote':     return `<blockquote class="cb-quote">${escapeHtml(b.text||'')}</blockquote>`;
    case 'image':     return `
      <div class="cb-image">
        <img src="${b.url||''}" alt="${b.caption||''}">
        ${b.caption ? `<div class="cb-caption">${escapeHtml(b.caption)}</div>` : ''}
      </div>`;
    default: return '';
  }
}

/* ── Share ── */
window.shareArticle = function(id, title) {
  const url = `${location.origin}${location.pathname}#article/${id}`;
  if (navigator.share) {
    navigator.share({ title: decodeURIComponent(title), url }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link másolva a vágólapra!'));
  }
};

/* ── Article header hide on scroll ── */
let lastScrollY = 0;
function setupArticleHeaderHide() {
  window.addEventListener('scroll', () => {
    if (!document.getElementById('view-article').classList.contains('active')) return;
    const hdr = document.getElementById('article-header');
    const cur = window.scrollY;
    if (cur > lastScrollY && cur > 80) hdr.classList.add('hidden');
    else hdr.classList.remove('hidden');
    lastScrollY = cur;
  }, { passive:true });
}

/* ── URL hash routing ── */
function routeHash() {
  const h = location.hash;
  if (h.startsWith('#article/')) openArticle(h.slice(9));
}
window.addEventListener('hashchange', routeHash);

/* ── Block builder ── */
window.addBlock = function(type) {
  editorBlocks.push(type==='image'
    ? { type:'image', url:'', caption:'' }
    : { type, text:'' });
  renderBlocks();
};

function renderBlocks() {
  const area = document.getElementById('blocksArea');
  if (!editorBlocks.length) {
    area.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:16px 0;">Adj hozzá blokkokat a fenti gombokkal.</div>`;
    return;
  }
  const labels = { para:'Bekezdés', heading:'Alcím', highlight:'Kiemelés', quote:'Idézet', image:'Kép' };
  area.innerHTML = editorBlocks.map((b,i) => `
    <div class="content-block">
      <div class="block-header">
        <span class="block-type-label">${labels[b.type]||b.type}</span>
        <div style="display:flex;gap:4px;align-items:center;">
          ${i>0?`<button class="block-del" title="Fel" onclick="moveBlock(${i},-1)">↑</button>`:''}
          ${i<editorBlocks.length-1?`<button class="block-del" title="Le" onclick="moveBlock(${i},1)">↓</button>`:''}
          <button class="block-del" onclick="removeBlock(${i})">✕</button>
        </div>
      </div>
      ${b.type==='image' ? `
        <div class="block-img-stack">
          <input placeholder="Kép URL (https://…)" value="${b.url||''}"
            oninput="updateBlockField(${i},'url',this.value);updateImgPreview(${i},this.value)">
          <input placeholder="Képaláírás (opcionális)" value="${b.caption||''}"
            oninput="updateBlockField(${i},'caption',this.value)">
          ${b.url?`<img class="img-preview" id="ip${i}" src="${b.url}" alt="előnézet">`:'<img class="img-preview" id="ip'+i+'" style="display:none;">'}
        </div>` : `
        <textarea class="block-textarea"
          oninput="updateBlockField(${i},'text',this.value)"
          placeholder="${b.type==='para'?'Bekezdés szövege…':b.type==='heading'?'Alcím…':b.type==='highlight'?'Kiemelt szöveg…':'Idézet…'}"
        >${b.text||''}</textarea>`}
    </div>`).join('');
}

window.removeBlock = function(i) {
  editorBlocks.splice(i,1); renderBlocks();
};
window.moveBlock = function(i, dir) {
  const j = i+dir;
  if (j<0||j>=editorBlocks.length) return;
  [editorBlocks[i],editorBlocks[j]] = [editorBlocks[j],editorBlocks[i]];
  renderBlocks();
};
/* Inline handlers run in global scope; module vars are not visible there. */
window.updateBlockField = function(i, field, value) {
  if (editorBlocks[i]) editorBlocks[i][field] = value;
};
window.updateImgPreview = function(i, url) {
  const el = document.getElementById('ip'+i);
  if (!el) return;
  el.style.display = url ? 'block' : 'none';
  el.src = url;
};

/* ── Tag chips ── */
window.handleTagInput = function(e) {
  if (e.key==='Enter'||e.key===',') {
    e.preventDefault();
    const val = e.target.value.replace(/^#+/,'').trim().toLowerCase();
    if (val && !editorTags.includes(val)) {
      editorTags.push(val); renderTagChips();
    }
    e.target.value = '';
  }
};
function renderTagChips() {
  const wrap = document.getElementById('tagsWrap');
  const input= document.getElementById('tagInput');
  wrap.innerHTML = editorTags.map((t,i) => `
    <span class="tag-chip">#${t}
      <button onclick="removeTag(${i})">✕</button>
    </span>`).join('');
  wrap.appendChild(input);
}
window.removeTag = function(i) {
  editorTags.splice(i,1); renderTagChips();
};

/* ── Save article ── */
window.saveArticle = async function() {
  if (!currentAdmin) {
    showToast('Jelentkezz be a cikk mentéséhez.');
    showView('view-login');
    return;
  }
  const title = document.getElementById('edTitle').value.trim();
  const desc  = document.getElementById('edDesc').value.trim();
  const cover = document.getElementById('edCover').value.trim();
  if (!title) { showToast('A cím megadása kötelező.'); return; }

  const author = getAuthorName();
  if (!author) {
    showToast('Jelentkezz be, és állíts be szerzőnevet a Profil fülön.');
    showView('view-login');
    return;
  }

  const data = {
    title, desc, cover,
    blocks:  editorBlocks.map(b => ({ ...b })),
    tags:    [...editorTags],
    author,
    updatedAt: serverTimestamp()
  };

  try {
    if (editorArticle) {
      await updateDoc(doc(db,'articles',editorArticle.id), data);
      showToast('Cikk frissítve.');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db,'articles'), data);
      showToast('Cikk közzétéve.');
    }
    await fetchArticles();
    renderMain();
    showView('view-admin');
    loadAdminDashboard();
  } catch (e) {
    console.error(e);
    const code = e?.code || '';
    if (code === 'permission-denied') {
      showToast('Nincs jogosultság. Jelentkezz be a megengedett admin emaillel, és ellenőrizd a Firestore szabályokat.');
    } else {
      showToast('A cikk mentése sikertelen: ' + (e.message || 'ismeretlen hiba'));
    }
  }
};

window.confirmLeaveEditor = async function() {
  const ok = await openModal('Kilépés szerkesztőből','Nem mentett változtatások elvesznek. Biztosan kilépsz?','Kilépés');
  if (ok) { showView('view-admin'); loadAdminDashboard(); }
};
